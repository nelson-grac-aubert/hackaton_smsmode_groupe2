services:

  # ── Backend NestJS ───────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - ${NESTJS_PORT}:3000
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ── Dashboard React (admin) ──────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - postgres
    networks:
      - app_network

  # ── Démo boutique L'Élégance ─────────────────────────────────────────────────
  demo:
    build: ./demo
    restart: always
    ports:
      - "3030:3030"
    depends_on:
      - postgres
    networks:
      - app_network

  # ── Migration Prisma (profil optionnel) ──────────────────────────────────────
  migrate:
    build: ./backend
    command: npx prisma migrate dev --name auto
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    profiles:
      - migrate

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:${POSTGRES_TAG}
    user: postgres
    ports:
      - ${POSTGRES_PORT}:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
