services:
  postgres:
    image: postgres:${POSTGRES_TAG:-17-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test}
      POSTGRES_DB: ${POSTGRES_DB:-test_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    command: npx prisma migrate dev --name auto
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    profiles:
      - migrate

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-test}:${POSTGRES_PASSWORD:-test}@postgres:5432/${POSTGRES_DB:-test_db}
      NESTJS_PORT: 3000
      NODE_ENV: DEVELOPMENT
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-5173}
      OTP_API_KEY: ${OTP_API_KEY:-x}
    ports:
      - "${NESTJS_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/doc >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ./back/src:/app/back/src
      - ./back/prisma:/app/back/prisma
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:${NESTJS_PORT:-3000}/api/v1
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./front/src:/app/front/src
      - ./front/public:/app/front/public
      - ./front/index.html:/app/front/index.html
      - ./front/vite.config.js:/app/front/vite.config.js
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge