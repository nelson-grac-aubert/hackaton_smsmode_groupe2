<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120">
  <rect width="360" height="120" fill="#ffffff" rx="0"/>

  <!-- Geometric mark : two nested squares rotated 45° -->
  <g transform="translate(56, 60)">
    <rect x="-22" y="-22" width="44" height="44" rx="2" transform="rotate(45)" fill="none" stroke="#111111" stroke-width="3"/>
    <rect x="-11" y="-11" width="22" height="22" rx="1" transform="rotate(45)" fill="#111111"/>
    <!-- small accent lines -->
    <line x1="-32" y1="0" x2="-26" y2="0" stroke="#111111" stroke-width="2"/>
    <line x1="26" y1="0" x2="32" y2="0" stroke="#111111" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <text x="96" y="54" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="30" font-weight="700" letter-spacing="10" fill="#111111">ATELIER</text>

  <!-- Thin separator -->
  <line x1="96" y1="64" x2="326" y2="64" stroke="#cccccc" stroke-width="0.8"/>

  <!-- Tagline -->
  <text x="96" y="82" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="11" font-weight="400" letter-spacing="5" fill="#888888">MAISON DE COUTURE</text>
</svg>
